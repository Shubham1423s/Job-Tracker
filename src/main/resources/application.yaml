spring:
  profiles:
    active: dev

    datasource:
      hikari:
        maximum-pool-size: 5
        minimum-idle: 2

      jpa:
        open-in-view: false
        database-platform: org.hibernate.dialect.MySQLDialect

    server:
      tomcat:
        threads:
          max: 50



